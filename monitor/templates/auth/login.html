<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
:root {
    --bg-color: #f5f7fb;
    --card-bg: #ffffff;
    --text-color: #111827;
    --btn-color: #000000;
    --input-bg: #ffffff;
    --label-color: #6b7280;
    --input-border: #d1d5db;
}

.dark-mode {
    --bg-color: #121212;         /* dark background */
    --card-bg: #1e1e1e;          /* dark card */
    --text-color: #e5e5e5;       /* light text */
    --btn-color: #000000;        /* black button */
    --input-bg: #2c2c2c;         /* dark input */
    --label-color: #a0a0a0;      /* gray label */
    --input-border: #444444;     /* input border */
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: "Inter", "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-color);
    transition: all 0.3s ease;
}

/* Card */
.container {
    width: 360px;
    padding: 34px;
    background: var(--card-bg);
    border-radius: 18px;
    position: relative;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    animation: floatIn 0.8s ease;
    overflow: hidden;
}

/* Animated black/gray border glow */
.container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    background: linear-gradient(270deg, #000000, #555555, #000000);
    background-size: 600% 600%;
    animation: borderGlow 3s ease infinite;
    opacity: 0.25;
    z-index: -1;
}

@keyframes floatIn {
    from { opacity: 0; transform: translateY(30px) scale(0.98);}
    to { opacity: 1; transform: translateY(0) scale(1);}
}

@keyframes borderGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h2 {
    text-align: center; margin-bottom: 26px;
    font-weight: 600; color: var(--text-color);
}

/* Input box */
.input-box { position: relative; margin-bottom: 22px; }
.input-box input {
    width: 100%; padding: 15px 14px; border-radius: 12px;
    border: 1px solid var(--input-border); background: var(--input-bg);
    outline: none; font-size: 14px; color: var(--text-color);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    transition: all 0.25s;
}
.input-box input:focus { border-color: #888888; }
.input-box label {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    padding: 0 6px; font-size: 13px; color: var(--label-color);
    background: var(--card-bg); pointer-events: none;
    transition: 0.25s;
}
.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px; font-size: 12px; color: #aaaaaa;
}

/* Password toggle */
.toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
cursor: pointer; color: #9ca3af; }

/* Button */
button {
    width: 100%; padding: 15px; margin-top: 8px;
    background: var(--btn-color); color: white;
    border: none; border-radius: 14px; font-size: 15px;
    cursor: pointer; transition: all 0.3s ease;
}
button:hover { opacity: 0.85; transform: translateY(-2px); }

/* Navbar */
.navbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 60px; background: var(--btn-color);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; color: white;
    transition: all 0.3s ease;
}
.toggle-theme {
    cursor: pointer; padding: 6px 12px; border-radius: 6px;
    border: 1px solid white;
}

/* Error / messages */
.message { color: red; font-size: 14px; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>
<nav class="navbar">
    <div>👤 Admin Login</div>
    <div class="toggle-theme" onclick="toggleTheme()">🌙</div>
</nav>

<div class="container">
    <h2>Admin Login</h2>
    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="input-box">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>
        <div class="input-box">
            <input type="password" name="password" id="password" required>
            <label>Password</label>
            <span class="toggle" onclick="togglePass('password')">👁️</span>
        </div>
        <button type="submit">Login</button>
    </form>
</div>

<script>
function togglePass(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
function toggleTheme(){
    document.body.classList.toggle("dark-mode");
    document.querySelector(".toggle-theme").textContent =
        document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
}
</script>
</body>
</html>
