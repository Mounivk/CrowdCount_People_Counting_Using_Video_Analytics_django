{% extends "base.html" %}
{% block content %}

<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI';">

    <h2 style="font-size:2.2vw; margin-bottom:10px;">Live Webcam Feed</h2>

    <!-- WEBCAM STREAM -->
    <img src="{% url 'webcam_feed' %}"
         style="max-width:90%; max-height:70vh; border-radius:12px;
                box-shadow:0 12px 25px rgba(0,0,0,0.15);">

    <!-- COUNT INFO -->
    <div style="margin-top:20px; text-align:center;">
        <h3>Live Count: <span id="count">0</span></h3>
        <h4>Accuracy: <span id="accuracy">0</span>%</h4>
    </div>

    <!-- BUTTONS -->
    <div style="margin-top:20px;">
        <button onclick="location.href='{% url 'viewer_dashboard' %}'"
                style="background:#0f172a; color:white; padding:10px 20px;
                       border:none; border-radius:8px;">
            ← Go Back
        </button>
        <button onclick="location.reload()"
                style="background:#0f172a; color:white; padding:10px 20px;
                       border:none; border-radius:8px;">
            Refresh Live
        </button>
    </div>

</div>

<script>
setInterval(() => {
    fetch("{% url 'live_count_webcam' %}")
        .then(res => res.json())
        .then(data => {
            document.getElementById("count").innerText = data.count;
            document.getElementById("accuracy").innerText = data.accuracy;
        });
}, 1000);

</script>

{% endblock %}
